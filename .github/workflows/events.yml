name: Official ONE PIECE Discord Announcer

on:
  schedule:
    # Runs every 6 hours. GitHub cron uses UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Check official ONE PIECE events and post new ones
        run: node index.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          POST_EXISTING: "true"
          MAX_POSTS_PER_RUN: "20"
          ALLOWED_REGIONS: "North America"
          STATE_FILE: "data/test-na-chrono-v1.json"

      - name: Commit updated seen-event list
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No seen-event changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "Update seen official ONE PIECE events"
            git push
          fi
